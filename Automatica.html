<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Affairs Tracker Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep:   #1a3a5c;
      --blue-mid:    #2563a8;
      --blue-light:  #f0f4f8;
      --yellow:      #f5c842;
      --yellow-soft: #fdf3c0;
      --white:       #ffffff;
      --gray-border: #e2e8f0;
      --radius:      12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--blue-light);
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* Tabs Navigation Bar Upper Segment */
    .tabs-nav {
      display: flex;
      gap: 0.5rem;
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      border-bottom: 2px solid var(--gray-border);
      padding-bottom: 1px;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 0.75rem 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--blue-deep);
    }

    .tab-btn.active {
      color: var(--blue-deep);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--yellow);
      border-radius: 2px;
    }

    /* Container Frame Structure */
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(26, 58, 92, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      background: var(--blue-deep);
      padding: 1.5rem;
      position: relative;
    }
    .card-header::after {
      content: ''; display: block; height: 4px; background: var(--yellow);
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    .card-header h1 {
      font-family: 'Syne', sans-serif; font-size: 1.4rem; color: var(--white);
    }
    .card-header p { margin-top: .3rem; font-size: .85rem; color: #93b8d8; }

    .card-body { padding: 1.5rem; flex: 1; }

    /* Form Layout Elements */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .full-width { grid-column: span 2; }
    label {
      display: block; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; color: var(--blue-deep); margin-bottom: .4rem;
    }
    input, select, textarea {
      width: 100%; padding: .6rem .8rem; border: 1.5px solid var(--gray-border);
      border-radius: var(--radius); font-size: .88rem; outline: none; background: #fff;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(37, 99, 168, .1);
    }
    input:readonly { background-color: #f8fafc; color: #64748b; cursor: not-allowed; }
    textarea { min-height: 80px; resize: vertical; }
    .conditional-field { display: none; margin-top: .6rem; }

    .btn-submit {
      width: 100%; padding: .85rem; margin-top: 1rem; background: var(--blue-mid);
      color: #fff; font-weight: 600; border: none; border-radius: var(--radius);
      cursor: pointer; transition: background .15s;
    }
    .btn-submit:hover { background: var(--blue-deep); }

    /* Live Feed Feed Layout elements */
    .task-feed {
      max-height: 720px; overflow-y: auto; padding-right: .25rem;
    }
    .task-item {
      background: #f8fafc; border: 1px solid var(--gray-border);
      border-radius: var(--radius); padding: 1rem; margin-bottom: 0.8rem;
      display: flex; align-items: center; justify-content: space-between;
      transition: transform .1s, border-color .2s, background-color .2s;
    }
    .task-item:hover { border-color: #cbd5e1; }
    
    /* Overdue Modification Class Injection Highlight Styling */
    .task-item.overdue-warning {
      background-color: var(--yellow-soft);
      border-color: #f59e0b;
    }
    .task-item.overdue-warning:hover {
      border-color: #d97706;
    }
    
    .task-details { max-width: 75%; }
    .task-desc { font-weight: 600; color: #1e293b; font-size: .95rem; margin-bottom: .2rem; }
    .task-meta { font-size: .78rem; color: #64748b; line-height: 1.4; }
    .badge {
      display: inline-block; padding: .1rem .4rem; font-size: .7rem;
      font-weight: 700; border-radius: 4px; text-transform: uppercase; margin-right: .3rem;
    }
    .badge.high { background: #fee2e2; color: #991b1b; }
    .badge.medium { background: #fef3c7; color: #92400e; }
    .badge.low { background: #e0f2fe; color: #0369a1; }
    .badge.tab { background: #e2e8f0; color: #334155; }
    .badge.overdue-flag { background: #dc2626; color: #ffffff; }

    .btn-complete {
      background: #10b981; color: #fff; font-size: .82rem; font-weight: 600;
      padding: .5rem .8rem; border: none; border-radius: 8px; cursor: pointer;
      display: inline-flex; align-items: center; gap: .3rem; transition: background .15s;
    }
    .btn-complete:hover { background: #059669; }
    .empty-state { text-align: center; color: #94a3b8; padding: 3rem 1rem; font-size: .9rem; }

    .flash {
      display: none; padding: .75rem; border-radius: var(--radius);
      font-size: .85rem; font-weight: 500; margin-bottom: 1rem;
    }
    .flash.success { background: var(--yellow-soft); color: #7a5e00; border: 1px solid var(--yellow); }
    .flash.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    @media (max-width: 768px) {
      body { padding: 0.5rem; }
      .tabs-nav { margin-bottom: 0.5rem; }
      .card-header { padding: 1rem; }
      .card-body { padding: 1rem; }
      .form-grid { grid-template-columns: 1fr; gap: 0.8rem; }
      .full-width { grid-column: span 1; }
      .task-item { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
      .task-details { max-width: 100%; }
      .btn-complete { width: 100%; justify-content: center; padding: 0.65rem; }
    }
  </style>
</head>
<body>

  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab(event, 'add-task-view')">Add New Action</button>
    <button class="tab-btn" onclick="switchTab(event, 'complete-task-view')">Complete Task Tracker</button>
  </div>

  <div class="dashboard-container">
    
    <div id="add-task-view" class="tab-content active">
      <div class="card">
        <div class="card-header">
          <h1>Log Action Item</h1>
          <p>Log a project (Please log as many spaces as you can to avoid bugs - Ghassane)</p>
        </div>
        <div class="card-body">
          <div class="flash" id="formFlash"></div>
          <form id="trackerForm">
            <div class="form-grid">
              
              <div class="field full-width" style="background: #f8fafc; padding: .8rem; border-radius: var(--radius); border: 1.5px dashed #cbd5e1;">
                <label for="sheet_select">Excel Sheet Destination</label>
                <select id="sheet_select" name="sheet_select" required>
                    <option value="" disabled selected>Choose Sheet destination...</option>
                    <option value="INST_MAROC">INST_MAROC</option>
                    <option value="MTEDD">MTEDD</option>
                    <option value="AMCI">AMCI</option>
                    <option value="MAECA">MAECA</option>
                    <option value="DFI_GENERAL">DFI_GENERAL</option>
                    <option value="PRJ_WB_SMRI">PRJ_WB_SMRI</option>
                    <option value="PRJ_BAD_DtP">PRJ_BAD_DtP</option>
                    <option value="PRJ_BID_REPCA">PRJ_BID_REPCA</option>
                    <option value="Other">Other (Create New Tab...)</option>
                </select>
                <div class="conditional-field" id="custom_sheet_box">
                  <label for="custom_sheet">Specify Custom Sheet Title</label>
                  <input type="text" id="custom_sheet" name="custom_sheet" placeholder="Type name for new tab..." />
                </div>
              </div>

              <div class="field">
                <label for="project">Project (Initiative)</label>
                <input type="text" id="project" name="project" required />
              </div>
              <div class="field">
                <label for="institution">Institution</label>
                <input type="text" id="institution" name="institution" required />
              </div>
              <div class="field">
                <label for="contacts">Key Contacts</label>
                <input type="text" id="contacts" name="contacts" required />
              </div>
              <div class="field">
                <label for="owner">Owner</label>
                <input type="text" id="owner" name="owner" placeholder="e.g. Malik, Salma ..." required />
              </div>
              <div class="field">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                  <option value="Courrier">Courrier</option>
                  <option value="Coordination">Coordination</option>
                  <option value="Mission">Mission</option>
                  <option value="Meeting">Meeting</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="field">
                <label for="priority">Priority</label>
                <select id="priority" name="priority" required>
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                  <option value="Critical">Critical</option>
                </select>
              </div>
              <div class="field">
                <label for="request_date">Request Date</label>
                <input type="text" id="request_date" name="request_date" readonly />
              </div>
              <div class="field">
                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date" required />
              </div>
              <div class="field full-width">
                <label for="action">Action (Short Description)</label>
                <input type="text" id="action" name="action" required />
              </div>
              <div class="field full-width">
                <label for="notes">Notes / Email Body Text</label>
                <textarea id="notes" name="notes"></textarea>
              </div>
            </div>
            <button type="submit" class="btn-submit">Add New Row Task →</button>
          </form>
        </div>
      </div>
    </div>

    <div id="complete-task-view" class="tab-content">
      <div class="card">
        <div class="card-header" style="background: #0f172a;">
          <h1>To Do List</h1>
          <p>Click on complete to remove it from active sheets and move it directly to the Finished bin.</p>
        </div>
        <div class="card-body" style="background: #fafafa;">
          <div class="flash" id="feedFlash"></div>
          <div class="task-feed" id="taskFeedContainer">
            <div class="empty-state">Loading records from spreadsheet BackEnd ledger...</div>
          </div>
        </div>
      </div>
    </div>

  </div>

<script>
  const form = document.getElementById('trackerForm');
  const formFlash = document.getElementById('formFlash');
  const feedFlash = document.getElementById('feedFlash');
  const feedContainer = document.getElementById('taskFeedContainer');
  const sheetSelect = document.getElementById('sheet_select');
  const customSheetBox = document.getElementById('custom_sheet_box');
  const customSheetInput = document.getElementById('custom_sheet');
  const reqDateInput = document.getElementById('request_date');

  // Sistema de pestañas interactivo
  function switchTab(event, viewId) {
    document.querySelectorAll('.tab-content').forEach(view => view.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    
    document.getElementById(viewId).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // Cargar Request Date con formato estandarizado
  const todayStr = new Date().toISOString().split('T')[0];
  reqDateInput.value = todayStr;
  const todayDateObj = new Date(todayStr + "T00:00:00");

  sheetSelect.addEventListener('change', function() {
    if (this.value === 'Other') {
      customSheetBox.style.display = 'block';
      customSheetInput.setAttribute('required', 'true');
    } else {
      customSheetBox.style.display = 'none';
      customSheetInput.removeAttribute('required');
      customSheetInput.value = '';
    }
  });

  function alertBox(element, message, type) {
    element.textContent = message;
    element.className = `flash ${type}`;
    element.style.display = 'block';
    setTimeout(() => { element.style.display = 'none'; }, 5000);
  }

  // Carga e indexación sincronizada con el script de OneDrive/Python
  async function loadActiveTasksRegistry() {
    try {
      const res = await fetch('/tasks');
      const tasks = await res.json() || [];
      
      if (tasks.length === 0) {
        feedContainer.innerHTML = `<div class="empty-state">✓ All clear! No active tracking rows inside central BackEnd matrix repository.</div>`;
        return;
      }

      feedContainer.innerHTML = '';
      tasks.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item';
        
        let isOverdue = false;
        let overdueBadgeHtml = '';
        
        // Conversión segura de formatos de fecha DD/MM/YYYY provistos por openpyxl
        if (task.due_date && task.due_date !== 'N/A' && task.due_date !== 'None') {
          let taskDueDateObj;
          if (task.due_date.includes('/')) {
            const parts = task.due_date.split('/');
            taskDueDateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
          } else {
            taskDueDateObj = new Date(task.due_date + "T00:00:00");
          }

          if (taskDueDateObj < todayDateObj) {
            isOverdue = true;
            item.classList.add('overdue-warning');
            overdueBadgeHtml = `<span class="badge overdue-flag">Overdue</span>`;
          }
        }
        
        const taskPriority = task.priority ? task.priority.toString() : 'Medium';
        const priorityClass = ['high', 'critical'].includes(taskPriority.toLowerCase()) ? 'high' : (taskPriority.toLowerCase() === 'low' ? 'low' : 'medium');

        item.innerHTML = `
          <div class="task-details">
            <div class="task-desc">${task.action || 'Untitled Action'}</div>
            <div class="task-meta">
              <span class="badge tab">Sheet: ${task.sheet || 'BackEnd'}</span>
              <span class="badge ${priorityClass}">${taskPriority}</span>
              ${overdueBadgeHtml}
              <br/>
              <strong>Project:</strong> ${task.project || 'N/A'} | <strong>Owner:</strong> ${task.owner || 'Unassigned'} | <strong>Due:</strong> ${task.due_date || 'N/A'}
            </div>
          </div>
          <div>
            <button class="btn-complete" onclick="markTaskArchived(${task.backend_row_index})">Complete</button>
          </div>
        `;
        feedContainer.appendChild(item);
      });
    } catch (err) {
      console.error(err);
      feedContainer.innerHTML = `<div class="empty-state" style="color: #ef4444;">Error reading from BackEnd matrix layer.</div>`;
    }
  }

  // Envío seguro al endpoint de cierre de colas en el app.py local
  async function markTaskArchived(backendRowIndex) {
    try {
      const res = await fetch('/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ backend_row_index: backendRowIndex })
      });
      
      if (res.ok) {
        alertBox(feedFlash, '✓ Row cleared from project registry and moved to Finished bin!', 'success');
        loadActiveTasksRegistry();
      } else {
        alertBox(feedFlash, 'Execution blocked by server.', 'error');
      }
    } catch {
      alertBox(feedFlash, 'Could not reach server pipeline layer.', 'error');
    }
  }

  // Intercepción del formulario sincronizado con los mapeos exactos del Flask
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(form));

    try {
      const res = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        alertBox(formFlash, '✓ Successfully saved to your selected target sheet arrangement and BackEnd ledger!', 'success');
        form.reset();
        reqDateInput.value = todayStr;
        customSheetBox.style.display = 'none';
        customSheetInput.removeAttribute('required');
        loadActiveTasksRegistry();
      } else {
        alertBox(formFlash, 'Ingestion failure inside local workspace.', 'error');
      }
    } catch {
      alertBox(formFlash, 'Network layer error trying to append data points.', 'error');
    }
  });

  loadActiveTasksRegistry();
</script>

</body>
</html>
