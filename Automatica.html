<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Affairs Tracker Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep: #1a3a5c;
      --blue-mid: #2563a8;
      --blue-light: #f0f4f8;
      --white: #ffffff;
      --gray-border: #e2e8f0;
      --radius: 12px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--blue-light); min-height: 100vh; padding: 1.5rem; }
    .dashboard-container { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
    @media (min-width: 1024px) { .dashboard-container { grid-template-columns: 450px 1fr; } }
    .card { background: var(--white); border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 2rem; border: 1px solid var(--gray-border); }
    .header-branding { grid-column: 1 / -1; display: flex; align-items: center; gap: 1rem; background: var(--blue-deep); padding: 1.5rem 2rem; border-radius: var(--radius); color: var(--white); }
    .header-branding h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; }
    h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; color: var(--blue-deep); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem; text-transform: uppercase; }
    input, select, textarea { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--gray-border); border-radius: 8px; background: #f8fafc; }
    button[type="submit"] { width: 100%; background: var(--blue-mid); color: var(--white); border: none; padding: 0.85rem; font-weight: 600; border-radius: 8px; cursor: pointer; }
    .alert-box { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; display: none; }
    .alert-success { background: #bbf7d0; color: #15803d; }
    .alert-error { background: #fee2e2; color: #b91c1c; }
    .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid var(--gray-border); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    th { background: #f8fafc; padding: 1rem; font-weight: 600; color: #475569; border-bottom: 2px solid var(--gray-border); }
    td { padding: 1rem; border-bottom: 1px solid var(--gray-border); color: #334155; }
    .pill { padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .pill-high { background: #fee2e2; color: #991b1b; }
    .pill-medium { background: #fef3c7; color: #92400e; }
    .pill-low { background: #e0f2fe; color: #075985; }
    .btn-complete { background: #f1f5f9; border: 1px solid var(--gray-border); padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; }
    .btn-complete:hover { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <div class="header-branding">
      <h1>Automatica</h1>
      <p>Global Affairs Pipeline & Operations Tracking Infrastructure</p>
    </div>

    <div class="card">
      <h2>Log Action Item</h2>
      <div id="formFlash" class="alert-box"></div>

      <form id="taskForm">
        <div class="form-group"><label>Project</label><input type="text" name="project" required /></div>
        <div class="form-group"><label>Institution</label><input type="text" name="institution" required /></div>
        <div class="form-group"><label>Contacts</label><input type="text" name="contacts" required /></div>
        <div class="form-group"><label>Action</label><input type="text" name="action" required /></div>
        
        <div class="form-group">
          <label>Category</label>
          <select name="category" required>
            <option value="Meeting">Meeting</option>
            <option value="Report Submission">Report Submission</option>
            <option value="Technical Review">Technical Review</option>
            <option value="Follow-up">Follow-up</option>
          </select>
        </div>

        <div class="form-group">
          <label>Priority</label>
          <select name="priority" required>
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>

        <div class="form-group"><label>Due Date</label><input type="date" name="dueDate" required /></div>
        <div class="form-group"><label>Owner</label><input type="text" name="owner" required /></div>
        
        <div class="form-group">
          <label>Target Sheet</label>
          <select id="targetSheet" name="targetSheet" required>
            <option value="BackEnd" selected>Central Master Ledger (BackEnd)</option>
            <option value="Custom">Route to Custom Team Tab...</option>
          </select>
        </div>

        <div id="customSheetBox" style="display: none;" class="form-group">
          <label>Custom Sheet Name</label>
          <input type="text" id="customSheetInput" name="customSheetInput" />
        </div>

        <div class="form-group"><label>Notes</label><textarea name="comments"></textarea></div>
        <input type="hidden" id="requestDate" name="requestDate" />

        <button type="submit">Deploy Record to Pipeline</button>
      </form>
    </div>

    <div class="card">
      <h2>Active Cloud Queue</h2>
      <div id="feedFlash" class="alert-box"></div>
      <div id="registryWrapper"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('taskForm');
    const targetSheet = document.getElementById('targetSheet');
    const customSheetBox = document.getElementById('customSheetBox');
    const customSheetInput = document.getElementById('customSheetInput');
    const registryWrapper = document.getElementById('registryWrapper');

    const today = new Date();
    document.getElementById('requestDate').value = String(today.getDate()).padStart(2, '0') + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + today.getFullYear();

    targetSheet.addEventListener('change', (e) => {
      if (e.target.value === 'Custom') {
        customSheetBox.style.display = 'block';
        customSheetInput.setAttribute('required', 'true');
      } else {
        customSheetBox.style.display = 'none';
        customSheetInput.removeAttribute('required');
      }
    });

    function showAlert(el, msg, type) {
      el.className = `alert-box alert-${type}`;
      el.innerText = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    // FIXED: Correctly fetches tasks from the aligned /get_tasks route
    async function loadTasks() {
      try {
        const res = await fetch('/get_tasks');
        if (!res.ok) throw new Error();
        const data = await res.json();
        const pending = data.NEW_TASK || [];

        if (pending.length === 0) {
          registryWrapper.innerHTML = '<p style="color:#64748b;text-align:center;padding:2rem;">Cloud storage queue is empty. Sync completed.</p>';
          return;
        }

        let html = '<div class="table-container"><table><thead><tr><th>Action</th><th>Tab</th><th>Owner</th><th>Due Date</th><th>Priority</th><th>Action</th></tr></thead><tbody>';
        pending.forEach((t, i) => {
          html += `<tr>
            <td><strong>${escapeHtml(t.action)}</strong><br><small>${escapeHtml(t.project)}</small></td>
            <td><code>${escapeHtml(t.target_sheet)}</code></td>
            <td>${escapeHtml(t.owner)}</td>
            <td>${escapeHtml(t.due_date)}</td>
            <td><span class="pill pill-${t.priority.toLowerCase()}">${t.priority}</span></td>
            <td><button class="btn-complete" onclick="archiveTask('${escapeHtml(t.action)}', ${i})">Complete</button></td>
          </tr>`;
        });
        registryWrapper.innerHTML = html + '</tbody></table></div>';
      } catch {
        registryWrapper.innerHTML = '<p style="color:#b91c1c;text-align:center;">Error reading from BackEnd matrix layer.</p>';
      }
    }

    async function archiveTask(action, idx) {
      try {
        const res = await fetch('/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: action, backend_row_index: idx })
        });
        if (res.ok) {
          showAlert(document.getElementById('feedFlash'), 'Completion logged to sync queue!', 'success');
          loadTasks();
        }
      } catch {
        showAlert(document.getElementById('feedFlash'), 'Error sending completion signal.', 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      if (data.targetSheet === 'Custom') data.targetSheet = data.customSheetInput;

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          showAlert(document.getElementById('formFlash'), 'Task deployed to cloud queue!', 'success');
          form.reset();
          loadTasks();
        }
      } catch {
        showAlert(document.getElementById('formFlash'), 'Network deployment link error.', 'error');
      }
    });

    function escapeHtml(str) { return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }
    loadTasks();
    setInterval(loadTasks, 15000);
  </script>
</body>
</html>
