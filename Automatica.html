<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Affairs Tracker Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep:   #1a3a5c;
      --blue-mid:    #2563a8;
      --blue-light:  #f0f4f8;
      --yellow:      #f5c842;
      --yellow-soft: #fdf3c0;
      --white:       #ffffff;
      --gray-border: #e2e8f0;
      --radius:      12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--blue-light);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .dashboard-container {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 1.5rem;
      max-width: 1700px;
      margin: 0 auto;
    }

    /* Cards Layout Base Style */
    .glass-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-border);
      padding: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    }

    h2 {
      font-family: 'Syne', sans-serif;
      color: var(--blue-deep);
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      border-bottom: 3px solid var(--yellow);
      padding-bottom: 0.5rem;
    }

    /* Dynamic Flash Alerts UI Arrangement */
    .flash-container {
      margin-bottom: 1rem;
      min-height: 45px;
    }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .alert-success { background: #e6fffa; color: #00664f; border: 1px solid #b2f5ea; }
    .alert-error { background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    /* Form Design Fields */
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--blue-deep); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #334155;
      background: #f8fafc;
      transition: all 0.2s ease;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue-mid); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,168,0.15); }

    .submit-btn {
      width: 100%;
      background: var(--blue-deep);
      color: var(--white);
      border: none;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--blue-mid); }

    /* Datatable Layout Styling Rules */
    .table-container { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    th { background: var(--blue-deep); color: var(--white); padding: 1rem; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
    td { padding: 1rem; border-bottom: 1px solid var(--gray-border); color: #475569; line-height: 1.4; vertical-align: middle; }
    
    tr:hover { background-color: #f8fafc; }

    /* Overdue Highlighting Framework Classes */
    tr.task-overdue { background-color: #fdf3c0 !important; }
    tr.task-overdue:hover { background-color: #fbeba8 !important; }

    .badge-overdue {
      background-color: #e53e3e;
      color: #ffffff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      text-transform: uppercase;
      margin-left: 0.6rem;
      display: inline-block;
      letter-spacing: 0.3px;
    }

    /* Badge Color Priorities Matrix */
    .priority-badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .priority-badge.high { background: #fed7d7; color: #9b2c2c; }
    .priority-badge.medium { background: #feebc8; color: #c05621; }
    .priority-badge.low { background: #e6fffa; color: #00664f; }

    .action-btn { padding: 0.5rem 0.75rem; border-radius: 6px; font-weight: 500; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .clear-btn { background: #e2e8f0; border: 1px solid #cbd5e1; color: #475569; }
    .clear-btn:hover { background: #e53e3e; border-color: #e53e3e; color: var(--white); }

    @media (max-width: 1100px) { .dashboard-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="dashboard-container">
    
    <div class="glass-card">
      <h2>Add New Action</h2>
      <div class="flash-container"><div id="formFlash" class="alert"></div></div>
      
      <form id="taskForm">
        <div class="form-group">
          <label>Project / Initiative</label>
          <input type="text" name="project" required placeholder="e.g., Coop, Renewable Bid" />
        </div>
        <div class="form-group">
          <label>Institution / Country</label>
          <input type="text" name="institution" required placeholder="e.g., Netherlands, MASEN" />
        </div>
        <div class="form-group">
          <label>Action / Description</label>
          <textarea name="action" rows="3" required placeholder="Enter primary assignment narrative description details..."></textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category">
            <option value="Courrier officiel">Courrier officiel</option>
            <option value="Coordination">Coordination</option>
            <option value="Réunion">Réunion / Event</option>
            <option value="Autre">Autre Cas</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select name="priority">
            <option value="Low">Low Priority</option>
            <option value="Medium" selected>Medium Priority</option>
            <option value="High">High Priority</option>
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" name="dueDate" required />
        </div>
        <div class="form-group">
          <label>Request Date</label>
          <input type="text" id="requestDate" name="requestDate" readonly />
        </div>
        <div class="form-group">
          <label>Owner Allocation</label>
          <input type="text" name="owner" placeholder="Staff Name Allocation" />
        </div>
        <div class="form-group">
          <label>Target Sheet Tab Routing</label>
          <select id="sheetSelector" name="targetSheet">
            <option value="BackEnd">Default (BackEnd Ledger Only)</option>
            <option value="Global Affairs">Global Affairs Tab</option>
            <option value="Custom">-- Route to Custom Tab Name --</option>
          </select>
        </div>
        <div class="form-group" id="customSheetContainer" style="display: none;">
          <label>Custom Tab Sheet Name</label>
          <input type="text" id="customSheetInput" placeholder="Enter precise Excel Tab String Name" />
        </div>
        <div class="form-group">
          <label>Comments / Internal Notes</label>
          <textarea name="comments" rows="2" placeholder="Optional comments context..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Ingest To System Pipeline</button>
      </form>
    </div>

    <div class="glass-card">
      <h2>Live Outstanding Operational Matrix</h2>
      <div class="flash-container"><div id="feedFlash" class="alert"></div></div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>Institution</th>
              <th>Action Details</th>
              <th>Category</th>
              <th>Priority</th>
              <th>Due Date</th>
              <th>Owner</th>
              <th>Operation</th>
            </tr>
          </thead>
          <tbody id="taskTableBody">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById('taskForm');
    const tableBody = document.getElementById('taskTableBody');
    const formFlash = document.getElementById('formFlash');
    const feedFlash = document.getElementById('feedFlash');
    const sheetSelector = document.getElementById('sheetSelector');
    const customSheetBox = document.getElementById('customSheetContainer');
    const customSheetInput = document.getElementById('customSheetInput');
    const reqDateInput = document.getElementById('requestDate');

    // Safe string character escape helper for inline attribute button routing
    const escapeHtml = (str) => str.replace(/'/g, "\\'");

    // Set client current request tracking timestamp date field baseline on startup
    const today = new Date();
    const todayStr = String(today.getDate()).padStart(2, '0') + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + today.getFullYear();
    reqDateInput.value = todayStr;

    // Visibility layout listener logic toggle matching custom tab entry forms
    sheetSelector.addEventListener('change', () => {
      if (sheetSelector.value === 'Custom') {
        customSheetBox.style.display = 'block';
        customSheetInput.setAttribute('required', 'true');
        customSheetInput.name = "targetSheet";
        sheetSelector.removeAttribute('name');
      } else {
        customSheetBox.style.display = 'none';
        customSheetInput.removeAttribute('required');
        customSheetInput.removeAttribute('name');
        sheetSelector.name = "targetSheet";
      }
    });

    function alertBox(element, text, type = 'success') {
      element.innerText = text;
      element.className = `alert alert-${type}`;
      element.style.display = 'block';
      setTimeout(() => { element.style.display = 'none'; }, 6000);
    }

    // Dynamic Render Execution Function Ingesting Live Cache Layout Models
    async function loadActiveTasksRegistry() {
      try {
        const res = await fetch('/tasks');
        if (!res.ok) throw new Error();
        const tasks = await res.json();
        
        tableBody.innerHTML = '';
        
        // Grab current clean reference midnight date block
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        if (tasks.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:2rem;">All clear! No current tasks tracked in pipeline arrays.</td></tr>`;
          return;
        }

        tasks.forEach(task => {
          let isOverdue = false;
          let dateStr = (task.dueDate || '').trim();

          // Evaluate timestamp conditions
          if (dateStr && dateStr.toLowerCase() !== 'n/a' && dateStr.toLowerCase() !== 'none') {
            const parts = dateStr.split('/');
            if (parts.length === 3) {
              const taskDate = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
              taskDate.setHours(0, 0, 0, 0);
              if (taskDate < now) {
                isOverdue = true;
              }
            }
          }

          const rowStyle = isOverdue ? 'class="task-overdue"' : '';
          const tagSpan = isOverdue ? `<span class="badge-overdue">Overdue</span>` : '';

          const rowHtml = `
            <tr ${rowStyle}>
              <td><strong>${task.project || ''}</strong></td>
              <td>${task.institution || ''}</td>
              <td>${task.action || ''}${tagSpan}</td>
              <td>${task.category || ''}</td>
              <td><span class="priority-badge ${task.priority ? task.priority.toLowerCase() : 'medium'}">${task.priority || 'Medium'}</span></td>
              <td>${task.dueDate || 'N/A'}</td>
              <td><code>${task.owner || 'Unassigned'}</code></td>
              <td>
                <button class="action-btn clear-btn" onclick="archiveTaskRow(${task.backendRowIndex}, '${escapeHtml(task.action)}')">
                  Complete
                </button>
              </td>
            </tr>
          `;
          tableBody.insertAdjacentHTML('beforeend', rowHtml);
        });
      } catch {
        tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#9b2c2c;">Active layout buffer error sync drops.</td></tr>`;
      }
    }

    async function archiveTaskRow(backendRowIndex, actionText) {
      if (!confirm(`Archive assignment row validation completion log: "${actionText}"?`)) return;
      try {
        const res = await fetch('/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: actionText, backend_row_index: backendRowIndex })
        });
        const json = await res.json();
        
        if (res.ok) {
          alertBox(feedFlash, '✓ Row cleared from project registry and moved to Finished bin!', 'success');
          loadActiveTasksRegistry();
        } else {
          alertBox(feedFlash, json.error || 'Execution blocked.', 'error');
        }
      } catch {
        alertBox(feedFlash, 'Could not reach server pipeline layer.', 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();

        if (res.ok) {
          alertBox(formFlash, '✓ Successfully saved to your selected target sheet arrangement and BackEnd ledger!', 'success');
          form.reset();
          reqDateInput.value = todayStr;
          customSheetBox.style.display = 'none';
          customSheetInput.removeAttribute('required');
          loadActiveTasksRegistry(); 
        } else {
          alertBox(formFlash, json.error || 'Ingestion failure.', 'error');
        }
      } catch {
        alertBox(formFlash, 'Server request submission drops.', 'error');
      }
    });

    // Boot initialize baseline render cycle on user window entry activation
    loadActiveTasksRegistry();
  </script>
</body>
</html>
