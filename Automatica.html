<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Affairs Tracker Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Syne:wght=700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-deep:   #1a3a5c;
      --blue-mid:    #2563a8;
      --blue-light:  #f0f4f8;
      --yellow:      #f5c842;
      --yellow-soft: #fdf3c0;
      --white:       #ffffff;
      --gray-border: #e2e8f0;
      --radius:      12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--blue-light);
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* Main Grid: Maintains the two-column view on desktop */
    .dashboard-container {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 1.5rem;
      max-width: 1700px;
      margin: 0 auto;
    }

    .glass-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-border);
      padding: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    }

    h2 {
      font-family: 'Syne', sans-serif;
      color: var(--blue-deep);
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      border-bottom: 3px solid var(--yellow);
      padding-bottom: 0.5rem;
    }

    .flash-container {
      margin-bottom: 1rem;
      min-height: 45px;
    }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .alert-success { background: #e6fffa; color: #00664f; border: 1px solid #b2f5ea; }
    .alert-error { background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--blue-deep); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #334155;
      background: #f8fafc;
      transition: all 0.2s ease;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue-mid); background: var(--white); box-shadow: 0 0 0 3px rgba(37,99,168,0.15); }
    input[readonly] { background-color: #e2e8f0; color: #64748b; cursor: not-allowed; }

    .submit-btn {
      width: 100%;
      background: var(--blue-deep);
      color: var(--white);
      border: none;
      padding: 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: var(--blue-mid); }

    .table-container { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    th { background: var(--blue-deep); color: var(--white); padding: 1rem; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
    td { padding: 1rem; border-bottom: 1px solid var(--gray-border); color: #475569; line-height: 1.4; vertical-align: middle; }
    
    tr { transition: background-color 0.15s ease; }
    tr:hover { background-color: #f8fafc; }

    /* Visual Overdue Highlighting Background Style */
    tr.task-overdue { background-color: var(--yellow-soft) !important; }
    tr.task-overdue:hover { background-color: #fbeba8 !important; }

    .badge-overdue {
      background-color: #e53e3e;
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      margin-left: 0.6rem;
      display: inline-block;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }

    .priority-badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .priority-badge.high, .priority-badge.critical { background: #fed7d7; color: #9b2c2c; }
    .priority-badge.medium { background: #feebc8; color: #c05621; }
    .priority-badge.low { background: #e6fffa; color: #00664f; }

    .badge-tab { background: #e2e8f0; color: #334155; padding: 0.2rem 0.5rem; font-size: 0.75rem; font-weight: 600; border-radius: 4px; text-transform: uppercase; }

    .action-btn { padding: 0.5rem 0.75rem; border-radius: 6px; font-weight: 500; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; border: none; }
    .clear-btn { background: #e2e8f0; border: 1px solid #cbd5e1; color: #475569; }
    .clear-btn:hover { background: #e53e3e; border-color: #e53e3e; color: var(--white); }

    /* Balanced breakpoint: Stacks cleanly only when screen sizes drop below tablet format */
    @media (max-width: 768px) { 
      .dashboard-container { grid-template-columns: 1fr; } 
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    
    <div class="glass-card">
      <h2>Add New Action</h2>
      <div class="flash-container"><div id="formFlash" class="alert"></div></div>
      
      <form id="taskForm">
        <div class="form-group">
          <label>Target Sheet Tab Routing</label>
          <select id="sheetSelector" name="sheet_select" required>
            <option value="" disabled selected>Choose Sheet destination...</option>
            <option value="INST_MAROC">INST_MAROC</option>
            <option value="MTEDD">MTEDD</option>
            <option value="AMCI">AMCI</option>
            <option value="MAECA">MAECA</option>
            <option value="DFI_GENERAL">DFI_GENERAL</option>
            <option value="PRJ_WB_SMRI">PRJ_WB_SMRI</option>
            <option value="PRJ_BAD_DtP">PRJ_BAD_DtP</option>
            <option value="PRJ_BID_REPCA">PRJ_BID_REPCA</option>
            <option value="Other">Other (Create New Tab...)</option>
          </select>
        </div>
        <div class="form-group" id="customSheetContainer" style="display: none;">
          <label>Custom Tab Sheet Name</label>
          <input type="text" id="customSheetInput" name="custom_sheet" placeholder="Type name for new tab..." />
        </div>
        <div class="form-group">
          <label>Project / Initiative</label>
          <input type="text" name="project" required placeholder="e.g., Initiative Name" />
        </div>
        <div class="form-group">
          <label>Institution</label>
          <input type="text" name="institution" required placeholder="e.g., Ministry, Corporate Body" />
        </div>
        <div class="form-group">
          <label>Key Contacts</label>
          <input type="text" name="contacts" required placeholder="Contact info strings" />
        </div>
        <div class="form-group">
          <label>Owner Allocation</label>
          <input type="text" name="owner" required placeholder="e.g. Malik, Salma ..." />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category" required>
            <option value="Courrier">Courrier</option>
            <option value="Coordination">Coordination</option>
            <option value="Mission">Mission</option>
            <option value="Meeting">Meeting</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select name="priority" required>
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" name="due_date" required />
        </div>
        <div class="form-group">
          <label>Request Date</label>
          <input type="text" id="requestDate" name="request_date" readonly />
        </div>
        <div class="form-group">
          <label>Action / Description</label>
          <input type="text" name="action" required placeholder="Short narrative summary assignment..." />
        </div>
        <div class="form-group">
          <label>Notes / Email Body Text</label>
          <textarea name="notes" rows="3" placeholder="Optional comments context..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Add New Row Task →</button>
      </form>
    </div>

    <div class="glass-card">
      <h2>Live Outstanding Operational Matrix</h2>
      <div class="flash-container"><div id="feedFlash" class="alert"></div></div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Project</th>
              <th>Institution</th>
              <th>Action Details</th>
              <th>Category</th>
              <th>Priority</th>
              <th>Due Date</th>
              <th>Owner</th>
              <th>Operation</th>
            </tr>
          </thead>
          <tbody id="taskTableBody">
            <tr><td colspan="8" style="text-align:center; padding:2rem;">Loading rows from active tracking system...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById('taskForm');
    const tableBody = document.getElementById('taskTableBody');
    const formFlash = document.getElementById('formFlash');
    const feedFlash = document.getElementById('feedFlash');
    const sheetSelector = document.getElementById('sheetSelector');
    const customSheetBox = document.getElementById('customSheetContainer');
    const customSheetInput = document.getElementById('customSheetInput');
    const reqDateInput = document.getElementById('requestDate');

    const escapeHtml = (str) => str.replace(/'/g, "\\'");

    // Synchronize current local context timestamp strings
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    reqDateInput.value = todayStr;
    const todayDateObj = new Date(todayStr + "T00:00:00");

    sheetSelector.addEventListener('change', function() {
      if (this.value === 'Other') {
        customSheetBox.style.display = 'block';
        customSheetInput.setAttribute('required', 'true');
      } else {
        customSheetBox.style.display = 'none';
        customSheetInput.removeAttribute('required');
        customSheetInput.value = '';
      }
    });

    function alertBox(element, text, type = 'success') {
      element.innerText = text;
      element.className = `alert alert-${type}`;
      element.style.display = 'block';
      setTimeout(() => { element.style.display = 'none'; }, 5000);
    }

    async function loadActiveTasksRegistry() {
      try {
        const res = await fetch('/tasks');
        if (!res.ok) throw new Error();
        const tasks = await res.json() || [];
        
        tableBody.innerHTML = '';

        if (tasks.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:2rem;">✓ All clear! No active tracking rows inside repository.</td></tr>`;
          return;
        }

        tasks.forEach(task => {
          let isOverdue = false;
          let dateStr = (task.due_date || '').trim();

          if (dateStr && dateStr.toLowerCase() !== 'n/a' && dateStr.toLowerCase() !== 'none') {
            let taskDueDateObj;
            if (dateStr.includes('/')) {
              const parts = dateStr.split('/');
              taskDueDateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            } else if (dateStr.includes('-')) {
              taskDueDateObj = new Date(dateStr + "T00:00:00");
            }

            if (taskDueDateObj && !isNaN(taskDueDateObj.getTime())) {
              if (taskDueDateObj < todayDateObj) {
                isOverdue = true;
              }
            }
          }

          const rowStyle = isOverdue ? 'class="task-overdue"' : '';
          const tagSpan = isOverdue ? `<span class="badge-overdue">Overdue (Due: ${task.due_date})</span>` : '';
          const taskPriority = task.priority ? task.priority.toString() : 'Medium';
          const priorityClass = ['high', 'critical'].includes(taskPriority.toLowerCase()) ? 'high' : (taskPriority.toLowerCase() === 'low' ? 'low' : 'medium');

          const rowHtml = `
            <tr ${rowStyle}>
              <td><strong>${task.project || 'N/A'}</strong></td>
              <td>${task.institution || 'N/A'}</td>
              <td>
                <span class="badge-tab" style="margin-right:0.4rem;">${task.sheet || 'BackEnd'}</span>
                ${task.action || 'Untitled Action'} ${tagSpan}
              </td>
              <td>${task.category || 'N/A'}</td>
              <td><span class="priority-badge ${priorityClass}">${taskPriority}</span></td>
              <td><strong>${task.due_date || 'N/A'}</strong></td>
              <td><code>${task.owner || 'Unassigned'}</code></td>
              <td>
                <button class="action-btn clear-btn" onclick="archiveTaskRow(${task.backend_row_index}, '${escapeHtml(task.action || '')}')">
                  Complete
                </button>
              </td>
            </tr>
          `;
          tableBody.insertAdjacentHTML('beforeend', rowHtml);
        });
      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#9b2c2c; padding:2rem;">Error reading from active registry backend rows.</td></tr>`;
      }
    }

    async function archiveTaskRow(backendRowIndex, actionText) {
      try {
        const res = await fetch('/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ backend_row_index: backendRowIndex })
        });
        
        if (res.ok) {
          alertBox(feedFlash, '✓ Row cleared from project registry and moved to Finished bin!', 'success');
          loadActiveTasksRegistry();
        } else {
          alertBox(feedFlash, 'Execution rejected or blocked by backend environment pipeline.', 'error');
        }
      } catch {
        alertBox(feedFlash, 'Could not reach server pipeline layer.', 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          alertBox(formFlash, '✓ Successfully saved to your selected target sheet arrangement and BackEnd ledger!', 'success');
          form.reset();
          reqDateInput.value = todayStr;
          customSheetBox.style.display = 'none';
          customSheetInput.removeAttribute('required');
          loadActiveTasksRegistry(); 
        } else {
          alertBox(formFlash, 'Ingestion failure inside local tracking workspace arrays.', 'error');
        }
      } catch {
        alertBox(formFlash, 'Server connection network request submission dropped.', 'error');
      }
    });

    loadActiveTasksRegistry();
  </script>
</body>
</html>
